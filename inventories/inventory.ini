inventory.ini
[dmz]
webdmz ansible_host=10.0.30.1 ansible_user=ansible
webdmz2 ansible_host=10.0.30.3 ansible_user=ansible

[haproxy]
haproxydmz ansible_host=10.0.30.2 ansible_user=ansible
nginx.yml
---
- name: Installer et démarrer nginx sur le serveur DMZ
  hosts: dmz
  become: true

  tasks:
    - name: Installer nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Démarrer et activer nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Déployer une page d'accueil personnalisée
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <head><title>DMZ Web</title></head>
            <body>
              <h1>Serveur Web DMZ - CYNA</h1>
              <p>Déployé avec Ansible.</p>
            </body>
          </html>
        owner: root
        group: root
        mode: '0644'
